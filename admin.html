<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Prohana | Manage Collection</title>
    <style>
        body { background: #111; color: #f4f1ea; font-family: 'Garamond', serif; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #000; padding: 30px; border: 1px solid #d6b05e; }
        h2 { color: #d6b05e; text-align: center; letter-spacing: 3px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 0; }
        button { width: 100%; padding: 15px; background: #d6b05e; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; color: #000; letter-spacing: 2px; }
        .product-item { border-bottom: 1px solid #333; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .edit-btn { background: #222; color: #d6b05e; border: 1px solid #d6b05e; padding: 5px 10px; cursor: pointer; margin-right: 5px; font-size: 10px; }
        .del-btn { background: #500; color: #fff; border: none; padding: 5px 10px; cursor: pointer; font-size: 10px; }
        .mode-indicator { text-align: center; font-size: 12px; color: #d6b05e; margin-bottom: 10px; display: none; font-weight: bold; }
        #status-msg { text-align: center; font-size: 12px; margin-top: 10px; color: #d6b05e; }
    </style>
</head>
<body>

<div class="container">
    <h2>PROHANA ADMIN</h2>
    <div id="editMode" class="mode-indicator">SEDANG MENGEDIT PRODUK...</div>
    
    <input type="hidden" id="editId" value="">
    <input type="text" id="pName" placeholder="Nama Sepatu (Contoh: The Commander)">
    <select id="pCat">
        <option value="MEN">MEN</option>
        <option value="WOMEN">WOMEN</option>
    </select>
    <select id="pSize">
        <option value="38 - 44">Pria (38 - 44)</option>
        <option value="36 - 40">Wanita (36 - 40)</option>
        <option value="Custom Size">Custom Size Only</option>
    </select>
    <textarea id="pDesc" placeholder="Deskripsi Pendek (Contoh: Superior Leather | Handcrafted)"></textarea>
    <input type="text" id="pImg" placeholder="Tempel Link Gambar ImgBB (Contoh: https://i.ibb.co/...)">
    
    <button id="mainBtn" onclick="saveProduct()">TAMBAHKAN PRODUK</button>
    <button id="cancelBtn" onclick="resetForm()" style="background:#333; color:#fff; display:none;">BATAL EDIT</button>
    <p id="status-msg"></p>

    <div id="productList" style="margin-top: 30px;">
        <h3 style="color:#d6b05e; border-bottom: 1px solid #d6b05e; padding-bottom: 10px;">Daftar Produk di Awan:</h3>
        <div id="listContent">Sedang memuat data...</div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AiZaSyDatFoRag3c-6phCIo1VNMsymBpyMSdApk",
    authDomain: "prohana-web.firebaseapp.com",
    projectId: "prohana-web",
    storageBucket: "prohana-web.firebasestorage.app",
    messagingSenderId: "57532624481",
    appId: "1:57532624481:web:99aa39607a22af791000a0",
    measurementId: "G-ZZMVHVT6T"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const colRef = collection(db, "produk_prohana");

  // Tampilkan Produk Secara Real-Time
  const q = query(colRef, orderBy("waktu", "desc"));
  onSnapshot(q, (snapshot) => {
    const list = document.getElementById('listContent');
    list.innerHTML = '';
    snapshot.forEach((doc) => {
      const p = doc.data();
      const id = doc.id;
      list.innerHTML += `
        <div class="product-item">
            <span><b>${p.nama}</b> (${p.kategori})</span>
            <div>
                <button class="edit-btn" onclick="prepareEdit('${id}', '${p.nama}', '${p.kategori}', '${p.ukuran}', '${p.deskripsi}', '${p.gambar}')">EDIT</button>
                <button class="del-btn" onclick="handleDelete('${id}')">HAPUS</button>
            </div>
        </div>`;
    });
  });

  // Fungsi Simpan (Tambah / Update)
  window.saveProduct = async function() {
    const name = document.getElementById('pName').value;
    const cat = document.getElementById('pCat').value;
    const size = document.getElementById('pSize').value;
    const desc = document.getElementById('pDesc').value;
    const img = document.getElementById('pImg').value;
    const editId = document.getElementById('editId').value;
    const msg = document.getElementById('status-msg');

    if(!name || !img) return alert("Nama dan Link Gambar harus diisi!");

    msg.innerText = "Memproses...";

    try {
      if(editId === "") {
        // Tambah Baru
        await addDoc(colRef, {
          nama: name, kategori: cat, ukuran: size, deskripsi: desc, gambar: img, waktu: serverTimestamp()
        });
        msg.innerText = "Produk berhasil ditambah!";
      } else {
        // Update Data
        const docRef = doc(db, "produk_prohana", editId);
        await updateDoc(docRef, {
          nama: name, kategori: cat, ukuran: size, deskripsi: desc, gambar: img
        });
        msg.innerText = "Produk berhasil diperbarui!";
      }
      resetForm();
    } catch (e) {
      console.error(e);
      msg.innerText = "Terjadi kesalahan.";
    }
  }

  // Fungsi Hapus
  window.handleDelete = async function(id) {
    if(confirm("Hapus produk ini dari database?")) {
      await deleteDoc(doc(db, "produk_prohana", id));
    }
  }

  // Siapkan Form untuk Edit
  window.prepareEdit = function(id, nama, kategori, ukuran, deskripsi, gambar) {
    document.getElementById('pName').value = nama;
    document.getElementById('pCat').value = kategori;
    document.getElementById('pSize').value = ukuran;
    document.getElementById('pDesc').value = deskripsi;
    document.getElementById('pImg').value = gambar;
    document.getElementById('editId').value = id;

    document.getElementById('mainBtn').innerText = "SIMPAN PERUBAHAN";
    document.getElementById('editMode').style.display = "block";
    document.getElementById('cancelBtn').style.display = "block";
    window.scrollTo(0,0);
  }

  window.resetForm = function() {
    document.getElementById('pName').value = '';
    document.getElementById('pDesc').value = '';
    document.getElementById('pImg').value = '';
    document.getElementById('editId').value = '';
    document.getElementById('mainBtn').innerText = "TAMBAHKAN PRODUK";
    document.getElementById('editMode').style.display = "none";
    document.getElementById('cancelBtn').style.display = "none";
    document.getElementById('status-msg').innerText = "";
  }
</script>

</body>
</html>
