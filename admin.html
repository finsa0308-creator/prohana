<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Prohana | Manage Collection</title>
    <style>
        body { background: #111; color: #f4f1ea; font-family: 'Garamond', serif; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #000; padding: 30px; border: 1px solid #d6b05e; }
        h2 { color: #d6b05e; text-align: center; letter-spacing: 3px; }
        label { font-size: 11px; color: #d6b05e; letter-spacing: 1px; text-transform: uppercase; display: block; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0 15px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 0; font-family: inherit; }
        .price-group { display: flex; gap: 10px; }
        button { width: 100%; padding: 15px; background: #d6b05e; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; color: #000; letter-spacing: 2px; text-transform: uppercase; }
        
        .preview-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 10px 0; }
        .preview-box { 
            aspect-ratio: 1/1; border: 1px dashed #d6b05e; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; background: #0a0a0a; position: relative;
        }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .preview-box span { color: #444; font-size: 8px; text-align: center; }

        .product-item { border-bottom: 1px solid #333; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .edit-btn { background: #222; color: #d6b05e; border: 1px solid #d6b05e; padding: 5px 10px; cursor: pointer; margin-right: 5px; font-size: 10px; }
        .del-btn { background: #500; color: #fff; border: none; padding: 5px 10px; cursor: pointer; font-size: 10px; }
        .mode-indicator { text-align: center; font-size: 12px; color: #d6b05e; margin-bottom: 10px; display: none; font-weight: bold; }
        #status-msg { text-align: center; font-size: 12px; margin-top: 10px; color: #d6b05e; }
    </style>
</head>
<body>

<div class="container">
    <h2>PROHANA ADMIN</h2>
    <div id="editMode" class="mode-indicator">SEDANG MENGEDIT PRODUK...</div>
    
    <input type="hidden" id="editId" value="">
    
    <label>Nama Sepatu</label>
    <input type="text" id="pName" placeholder="Contoh: The Aurora Backless">
    
    <label>Harga (Normal & Sale)</label>
    <div class="price-group">
        <input type="text" id="pPriceNormal" placeholder="Normal: 330.000">
        <input type="text" id="pPriceSale" placeholder="Sale: 320.000">
    </div>

    <label>Kategori Koleksi</label>
    <select id="pCat" onchange="updateSizeOptions()">
        <option value="MEN">MEN (Koleksi Pria)</option>
        <option value="WOMEN">WOMEN (Women Classy)</option>
    </select>
    
    <label>Rentang Ukuran</label>
    <select id="pSize">
        </select>
    
    <label>Deskripsi (Gunakan 3 Kata Elegan)</label>
    <textarea id="pDesc" placeholder="Contoh: Timeless. Elegant. Authentic."></textarea>
    
    <label>Link Foto (Maksimal 5)</label>
    <input type="text" class="pImgInput" placeholder="Link Foto 1 (Utama)" oninput="updatePreviews()">
    <input type="text" class="pImgInput" placeholder="Link Foto 2" oninput="updatePreviews()">
    <input type="text" class="pImgInput" placeholder="Link Foto 3" oninput="updatePreviews()">
    <input type="text" class="pImgInput" placeholder="Link Foto 4" oninput="updatePreviews()">
    <input type="text" class="pImgInput" placeholder="Link Foto 5" oninput="updatePreviews()">

    <div class="preview-container" id="previewContainer">
        <div class="preview-box"><span>FOTO 1</span><img src=""></div>
        <div class="preview-box"><span>FOTO 2</span><img src=""></div>
        <div class="preview-box"><span>FOTO 3</span><img src=""></div>
        <div class="preview-box"><span>FOTO 4</span><img src=""></div>
        <div class="preview-box"><span>FOTO 5</span><img src=""></div>
    </div>
    
    <button id="mainBtn" onclick="saveProduct()">TAMBAHKAN PRODUK</button>
    <button id="cancelBtn" onclick="resetForm()" style="background:#333; color:#fff; display:none;">BATAL EDIT</button>
    <p id="status-msg"></p>

    <div id="productList" style="margin-top: 30px;">
        <h3 style="color:#d6b05e; border-bottom: 1px solid #d6b05e; padding-bottom: 10px; font-size: 16px;">DAFTAR PRODUK TERPASANG:</h3>
        <div id="listContent">Sedang memuat data...</div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AiZaSyDatFoRag3c-6phCIo1VNMsymBpyMSdApk",
    authDomain: "prohana-web.firebaseapp.com",
    projectId: "prohana-web",
    storageBucket: "prohana-web.firebasestorage.app",
    messagingSenderId: "57532624481",
    appId: "1:57532624481:web:99aa39607a22af791000a0",
    measurementId: "G-ZZMVHVT6T"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const colRef = collection(db, "produk_prohana");

  // Update opsi size berdasarkan kategori
  window.updateSizeOptions = function() {
    const cat = document.getElementById('pCat').value;
    const sizeSelect = document.getElementById('pSize');
    if (cat === "WOMEN") {
        sizeSelect.innerHTML = `
            <option value="36 - 40 | Available Custom Size">36 - 40 | Available Custom Size</option>
            <option value="Custom Size Only">Custom Size Only</option>
        `;
    } else {
        sizeSelect.innerHTML = `
            <option value="38 - 45 | Available Custom Size">38 - 45 | Available Custom Size</option>
            <option value="Custom Size Only">Custom Size Only</option>
        `;
    }
  }

  window.updatePreviews = function() {
      const inputs = document.querySelectorAll('.pImgInput');
      const boxes = document.querySelectorAll('.preview-box');
      
      inputs.forEach((input, index) => {
          const img = boxes[index].querySelector('img');
          const span = boxes[index].querySelector('span');
          if(input.value) {
              img.src = input.value;
              img.style.display = 'block';
              span.style.display = 'none';
          } else {
              img.style.display = 'none';
              span.style.display = 'block';
          }
      });
  }

  const q = query(colRef, orderBy("waktu", "desc"));
  onSnapshot(q, (snapshot) => {
    const list = document.getElementById('listContent');
    list.innerHTML = '';
    snapshot.forEach((doc) => {
      const p = doc.data();
      const id = doc.id;
      const item = document.createElement('div');
      item.className = 'product-item';
      item.innerHTML = `<span><b>[${p.kategori}]</b> ${p.nama}</span>`;
      
      const btnWrap = document.createElement('div');
      const btnEdit = document.createElement('button');
      btnEdit.className = 'edit-btn'; btnEdit.innerText = 'EDIT';
      btnEdit.onclick = () => prepareEdit(id, p);

      const btnDel = document.createElement('button');
      btnDel.className = 'del-btn'; btnDel.innerText = 'HAPUS';
      btnDel.onclick = () => handleDelete(id);

      btnWrap.appendChild(btnEdit); btnWrap.appendChild(btnDel);
      item.appendChild(btnWrap);
      list.appendChild(item);
    });
  });

  window.saveProduct = async function() {
    const name = document.getElementById('pName').value;
    const priceNormal = document.getElementById('pPriceNormal').
