<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AiZaSyDatFoRag3c-6phCIo1VNMsymBpyMSdApk",
    authDomain: "prohana-web.firebaseapp.com",
    projectId: "prohana-web",
    storageBucket: "prohana-web.firebasestorage.app",
    messagingSenderId: "57532624481",
    appId: "1:57532624481:web:99aa39607a22af791000a0",
    measurementId: "G-ZZMVHVT6T"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const slider = document.getElementById('mainSlider');

  function renderProducts(snapshot) {
    let menProducts = [];
    let womenProducts = [];

    // Kelompokkan produk berdasarkan kategori
    snapshot.forEach(doc => {
      const data = { id: doc.id, ...doc.data() };
      if (data.kategori === "WOMEN") {
        womenProducts.push(data);
      } else {
        menProducts.push(data);
      }
    });

    // 1. Halaman Awal (Cover)
    let content = `
    <div class="page">
        <h1 style="color: #d6b05e; letter-spacing: 15px; font-weight: 300; font-size: 45px; margin: 0;">PROHANA</h1>
        <p style="color: #666; font-size: 10px; letter-spacing: 6px; text-transform: uppercase; margin-top: 15px;">The Noble Essence of Leather</p>
        <div style="width: 50px; height: 1px; background: #d6b05e; margin-top: 30px; opacity: 0.5;"></div>
        <p class="swipe-hint">← SWIPE TO EXPLORE →</p>
    </div>`;

    // 2. Divider Koleksi Pria
    if (menProducts.length > 0) {
      content += `
      <div class="page" style="background: #050505;">
          <h2 style="color: #d6b05e; letter-spacing: 10px; font-weight: 300; font-size: 28px; text-transform: uppercase;">Men Collection</h2>
          <p style="color: #555; font-size: 9px; letter-spacing: 4px;">THE GENTLEMEN SERIES</p>
          <div style="width: 30px; height: 1px; background: #d6b05e; margin-top: 20px; opacity: 0.4;"></div>
      </div>`;
      
      menProducts.forEach(p => { content += generateProductHTML(p); });
    }

    // 3. Divider Koleksi Wanita
    if (womenProducts.length > 0) {
      content += `
      <div class="page" style="background: #050505;">
          <h2 style="color: #d6b05e; letter-spacing: 10px; font-weight: 300; font-size: 28px; text-transform: uppercase;">Women Classy</h2>
          <p style="color: #555; font-size: 9px; letter-spacing: 4px;">THE ELEGANT SOUL</p>
          <div style="width: 30px; height: 1px; background: #d6b05e; margin-top: 20px; opacity: 0.4;"></div>
      </div>`;

      womenProducts.forEach(p => { content += generateProductHTML(p); });
    }
    
    slider.innerHTML = content;
  }

  function generateProductHTML(p) {
    const album = p.album || [p.gambar || p.imageUrl || ""]; 
    const sizeText = p.ukuran || "Available Custom Size";
    const displayPrice = p.hargaSale ? `Rp ${p.hargaSale}` : "Contact for Price";
    const oldPrice = p.hargaNormal ? `Rp ${p.hargaNormal}` : "";
    const waMessage = `Halo Admin Prohana, saya tertarik dengan "${p.nama}" (Size: ${sizeText}). Apakah stok masih tersedia?`;
    
    let photoElements = "";
    album.forEach(imgUrl => {
        if(imgUrl) {
          photoElements += `<img src="${imgUrl}" class="product-photo" onerror="this.src='logo_prohana.jpeg'">`;
        }
    });

    return `
      <div class="page">
          ${album.length > 1 ? '<div class="detail-hint">↔ SWIPE PHOTO FOR DETAILS</div>' : ''}
          <div class="img-slider">
              ${photoElements}
          </div>
          <div class="info">
              <div class="category-info">${p.kategori || "Premium Leather"}</div>
              <h2 class="title">${p.nama || "Product Name"}</h2>
              <div class="price-container">
                  ${oldPrice ? `<span class="old-price">Rp ${oldPrice}</span>` : ''}
                  <span class="new-price">${displayPrice}</span>
              </div>
              <div class="size-info">${sizeText}</div>
              <p class="desc">${p.deskripsi || "High Quality Leather Craftsmanship"}</p>
              <a href="https://wa.me/62882007078068?text=${encodeURIComponent(waMessage)}" class="btn-wa">TANYA STOK & SIZE</a>
          </div>
      </div>`;
  }

  const q = query(collection(db, "produk_prohana"), orderBy("waktu", "desc"));
  onSnapshot(q, (snapshot) => {
    renderProducts(snapshot);
  });
</script>
