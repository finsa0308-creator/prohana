<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROHANA | Leather Lookbook</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; background: #000; 
            font-family: 'Garamond', serif; color: #f4f1ea; 
            height: 100vh; width: 100vw; overflow: hidden; 
        }
        
        /* Slider Utama Antar Produk */
        .slider-container {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            height: 100%; width: 100%; -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
        }
        .slider-container::-webkit-scrollbar { display: none; }
        
        .page {
            min-width: 100vw; height: 100vh; scroll-snap-align: start;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; position: relative; flex-shrink: 0;
        }

        /* Perbaikan Slider Foto: Menggunakan overflow agar bisa digeser lancar */
        .img-slider { 
            width: 100%; height: 40%; display: flex; 
            overflow-x: auto; scroll-snap-type: x mandatory; 
            gap: 0; -webkit-overflow-scrolling: touch;
            z-index: 10;
            touch-action: pan-x; 
        }
        .img-slider::-webkit-scrollbar { display: none; }
        
        .product-photo { 
            min-width: 100%; height: 100%; object-fit: contain; 
            scroll-snap-align: center;
            mix-blend-mode: lighten; filter: contrast(1.1) brightness(0.9); 
            flex-shrink: 0;
        }

        .info { text-align: center; margin-top: 15px; max-width: 350px; }
        .category-info { color: #d6b05e; font-size: 10px; letter-spacing: 3px; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        .title { font-size: 26px; letter-spacing: 2px; margin: 5px 0; font-weight: 300; text-transform: uppercase; }
        
        /* Tampilan Harga */
        .price-container { margin: 10px 0; }
        .old-price { font-size: 12px; color: #666; text-decoration: line-through; margin-right: 8px; letter-spacing: 1px; }
        .new-price { font-size: 18px; color: #d6b05e; font-weight: bold; letter-spacing: 1px; }

        .size-info { 
            font-size: 11px; color: #d6b05e; letter-spacing: 1px; 
            margin: 10px 0 15px 0; display: inline-block; 
            border: 1px solid rgba(214, 176, 94, 0.4); padding: 5px 15px;
            background: rgba(214, 176, 94, 0.05);
            text-transform: uppercase;
        }
        
        .desc { font-size: 12px; color: #888; line-height: 1.6; margin-bottom: 20px; letter-spacing: 1px; }
        
        .btn-wa {
            display: inline-block; padding: 14px 40px; border: 1px solid #d6b05e; 
            color: #d6b05e; text-decoration: none; font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
        }

        .swipe-hint { position: absolute; bottom: 30px; font-size: 8px; color: #444; letter-spacing: 5px; text-transform: uppercase; }
        .detail-hint { font-size: 9px; color: #d6b05e; margin-bottom: 10px; letter-spacing: 2px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="slider-container" id="mainSlider">
    <div class="page">
        <h1 style="color: #d6b05e; letter-spacing: 15px; font-weight: 300; font-size: 45px; margin: 0;">PROHANA</h1>
        <p style="color: #666; font-size: 10px; letter-spacing: 6px; text-transform: uppercase; margin-top: 15px;">The Noble Essence of Leather</p>
        <div style="width: 50px; height: 1px; background: #d6b05e; margin-top: 30px; opacity: 0.5;"></div>
        <p class="swipe-hint">← SWIPE TO EXPLORE →</p>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AiZaSyDatFoRag3c-6phCIo1VNMsymBpyMSdApk",
    authDomain: "prohana-web.firebaseapp.com",
    projectId: "prohana-web",
    storageBucket: "prohana-web.firebasestorage.app",
    messagingSenderId: "57532624481",
    appId: "1:57532624481:web:99aa39607a22af791000a0",
    measurementId: "G-ZZMVHVT6T"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const slider = document.getElementById('mainSlider');

  function renderProducts(snapshot) {
    let content = `
    <div class="page">
        <h1 style="color: #d6b05e; letter-spacing: 15px; font-weight: 300; font-size: 45px; margin: 0;">PROHANA</h1>
        <p style="color: #666; font-size: 10px; letter-spacing: 6px; text-transform: uppercase; margin-top: 15px;">The Noble Essence of Leather</p>
        <div style="width: 50px; height: 1px; background: #d6b05e; margin-top: 30px; opacity: 0.5;"></div>
        <p class="swipe-hint">← SWIPE TO EXPLORE →</p>
    </div>`;

    snapshot.forEach(doc => {
      const p = doc.data();
      const album = p.album || [p.gambar || p.imageUrl || ""]; 
      const sizeText = p.ukuran || "38-45 | Custom Size";
      
      // Format Harga
      const displayPrice = p.hargaSale ? `Rp ${p.hargaSale}` : "Contact for Price";
      const oldPrice = p.hargaNormal ? `Rp ${p.hargaNormal}` : "";

      const waMessage = `Halo Admin Prohana, saya tertarik dengan "${p.nama}" (Size: ${sizeText}). Apakah stok masih tersedia?`;
      
      let photoElements = "";
      album.forEach(imgUrl => {
          if(imgUrl) {
            photoElements += `<img src="${imgUrl}" class="product-photo" onerror="this.src='logo_prohana.jpeg'">`;
          }
      });

      content += `
        <div class="page">
            ${album.length > 1 ? '<div class="detail-hint">↔ SWIPE PHOTO FOR DETAILS</div>' : ''}
            <div class="img-slider">
                ${photoElements}
            </div>
            <div class="info">
                <div class="category-info">${p.kategori || "Premium Leather"}</div>
                <h2 class="title">${p.nama || "Product Name"}</h2>
                
                <div class="price-container">
                    ${oldPrice ? `<span class="old-price">${oldPrice}</span>` : ''}
                    <span class="new-price">${displayPrice}</span>
                </div>

                <div class="size-info">SIZE: ${sizeText}</div>
                <p class="desc">${p.deskripsi || "High Quality Leather Craftsmanship"}</p>
                
                <a href="https://wa.me/62882007078068?text=${encodeURIComponent(waMessage)}" class="btn-wa">TANYA STOK & SIZE</a>
            </div>
        </div>`;
    });
    
    slider.innerHTML = content;
  }

  const q = query(collection(db, "produk_prohana"), orderBy("waktu", "desc"));
  onSnapshot(q, (snapshot) => {
    renderProducts(snapshot);
  });
</script>

</body>
</html>
