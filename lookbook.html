<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROHANA | Leather Lookbook</title>
    <style>
        /* Gaya CSS tetap sama seperti milik Kakak */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; background: #000; 
            font-family: 'Garamond', serif; color: #f4f1ea; 
            height: 100vh; width: 100vw; overflow: hidden; 
        }
        .slider-container {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            height: 100%; width: 100%; -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
        }
        .slider-container::-webkit-scrollbar { display: none; }
        .page {
            min-width: 100vw; height: 100vh; scroll-snap-align: start;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 40px; position: relative; flex-shrink: 0;
        }
        .divider-page h2 { font-size: 10px; letter-spacing: 8px; color: #d6b05e; text-transform: uppercase; margin-bottom: 20px; }
        .divider-page h1 { font-size: 38px; font-weight: 300; letter-spacing: 12px; text-transform: uppercase; border-bottom: 1px solid #d6b05e; padding-bottom: 20px; }
        .img-wrap { width: 100%; height: 45%; display: flex; justify-content: center; align-items: center; }
        .img-wrap img { 
            max-width: 95%; max-height: 100%; object-fit: contain; 
            mix-blend-mode: lighten; filter: contrast(1.1) brightness(0.9); 
        }
        .info { text-align: center; margin-top: 25px; max-width: 350px; }
        .size-info { color: #d6b05e; font-size: 10px; letter-spacing: 3px; margin-bottom: 15px; text-transform: uppercase; font-weight: bold; }
        .title { font-size: 28px; letter-spacing: 2px; margin: 5px 0; font-weight: 300; }
        .desc { font-size: 12px; color: #888; line-height: 1.8; margin-bottom: 25px; letter-spacing: 1px; }
        .btn-wa {
            display: inline-block; padding: 15px 45px; border: 1px solid #d6b05e; 
            color: #d6b05e; text-decoration: none; font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
        }
        .swipe-hint { position: absolute; bottom: 30px; font-size: 8px; color: #444; letter-spacing: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="slider-container" id="mainSlider">
    <div class="page">
        <h1 style="color: #d6b05e; letter-spacing: 15px; font-weight: 300; font-size: 45px; margin: 0;">PROHANA</h1>
        <p style="color: #666; font-size: 10px; letter-spacing: 6px; text-transform: uppercase; margin-top: 15px;">The Noble Essence of Leather</p>
        <div style="width: 50px; height: 1px; background: #d6b05e; margin-top: 30px; opacity: 0.5;"></div>
        <p class="swipe-hint">← SWIPE TO REVEAL THE CRAFT →</p>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // Konfigurasi Firebase Kak Finsa
  const firebaseConfig = {
    apiKey: "AiZaSyDatFoRag3c-6phCIo1VNMsymBpyMSdApk",
    authDomain: "prohana-web.firebaseapp.com",
    projectId: "prohana-web",
    storageBucket: "prohana-web.firebasestorage.app",
    messagingSenderId: "57532624481",
    appId: "1:57532624481:web:99aa39607a22af791000a0",
    measurementId: "G-ZZMVHVT6T"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const slider = document.getElementById('mainSlider');

  // Fungsi untuk menampilkan produk
  function renderProducts(docs) {
    // Reset slider tapi sisakan Cover (halaman pertama)
    const cover = slider.firstElementChild.outerHTML;
    slider.innerHTML = cover;

    // Tambahkan Divider untuk Masterpiece
    slider.innerHTML += `<div class="page divider-page"><h2>COLLECTION</h2><h1>MASTERPIECE</h1></div>`;

    docs.forEach(doc => {
      const p = doc.data();
      const waMessage = `Halo Admin Prohana, saya tertarik dengan "${p.nama}". Apakah tersedia?`;
      
      slider.innerHTML += `
        <div class="page">
            <div class="img-wrap"><img src="${p.gambar}"></div>
            <div class="info">
                <div class="size-info">Premium Leather Collection</div>
                <h2 class="title">${p.nama}</h2>
                <p class="desc">${p.deskripsi}</p>
                <a href="https://wa.me/62882007078068?text=${encodeURIComponent(waMessage)}" class="btn-wa">TANYA STOK & SIZE</a>
            </div>
        </div>`;
    });
  }

  // Ambil data real-time dari Firestore
  const q = query(collection(db, "produk_prohana"), orderBy("waktu", "desc"));
  onSnapshot(q, (snapshot) => {
    renderProducts(snapshot);
  });
</script>

</body>
</html>
